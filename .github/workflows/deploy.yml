name: Deploy Wiki to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'lab_manuals/src/**'
      - 'gh_pages/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: gh_pages/pnpm-lock.yaml

      - name: Install dependencies
        run: cd gh_pages && pnpm install --frozen-lockfile

      - name: Build Docusaurus site
        run: cd gh_pages && pnpm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./gh_pages/build
