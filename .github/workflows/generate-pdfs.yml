name: Generate PDFs

on:
  push:
    branches: [main]
    paths:
      - 'lab_manuals/src/**'
      - 'pdf-gen/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache Puppeteer Chromium
        uses: actions/cache@v4
        with:
          path: ~/.cache/puppeteer
          key: puppeteer-${{ hashFiles('pdf-gen/package-lock.json') }}
          restore-keys: puppeteer-

      - name: Install dependencies
        run: npm ci
        working-directory: pdf-gen

      - name: Generate PDFs
        run: node generate.mjs
        working-directory: pdf-gen

      - name: Commit PDFs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lab_manuals/pdf/*/Zephyr-Getting-Started_*.pdf
          if git diff --staged --quiet; then
            echo "No PDF changes to commit"
          else
            git commit -m "chore: regenerate lab manual PDFs [skip ci]"
            git push
          fi
